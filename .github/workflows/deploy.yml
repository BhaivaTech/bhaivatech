name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:

  # ─── CI: runs on every push and every PR ───────────────────────
  check:
    name: Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PHP syntax
        run: |
          sudo apt-get install -y php-cli
          find . -name "*.php" -not -path "./.git/*" | while read file; do
            php -l "$file" || exit 1
          done
          echo "✅ All PHP files are valid"

      - name: Validate HTML files
        run: |
          find . -name "*.html" -o -name "*.shtml" | while read file; do
            if grep -qiE "<script[^>]*src=['\"](?!http)" "$file" 2>/dev/null; then
              echo "Checked: $file"
            fi
          done
          echo "✅ HTML check done"

      - name: Setup Node.js for minification
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minification tools
        run: npm install -g uglify-js clean-css-cli

      - name: Minify JS files
        run: |
          find ./js -name "*.js" -not -name "*.min.js" | while read file; do
            out="${file%.js}.min.js"
            uglifyjs "$file" -o "$out" --compress --mangle
            echo "Minified: $file → $out"
          done

      - name: Minify CSS files
        run: |
          find ./css -name "*.css" -not -name "*.min.css" | while read file; do
            out="${file%.css}.min.css"
            cleancss -o "$out" "$file"
            echo "Minified: $file → $out"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-site
          path: |
            .
            !.git
            !.github
            !node_modules

  # ─── CD: runs only on merge to main, only if check passed ──────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-site

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ./
          retry: 3
          retry-min-timeout: 10000
          retry-max-timeout: 60000
          dangerous-clean-slate: false
          timeout: 600000
          passive: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.map

      - name: Notify success
        if: success()
        run: echo "🚀 Deployed successfully to bhaivatech.com"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check the logs above"
